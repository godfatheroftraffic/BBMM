  4. Deploy both files together
  
  NO CODE CHANGES NEEDED PER BRAND!

  - 350+ parameter capture (AdKernel + Keitaro + Creative DNA + Avalanche)
  - GTM conversion tracking (loaded from config)
  - Complete cookie-based parameter passthrough
  - EPS/APS predictive scoring
  - 365-day cookie expiration for maximum tracking
  
  ========================================================================
  GTM EVENTS FIRED:
  ========================================================================
  
  ON PAGE VIEW:
  1. echo_lp_view - Landing page view (Step 0)
  2. master_lp_view_retargeting - Archetype/angle retargeting (15 pixels)
  
  ON CTA CLICK:
  3. echo_cta_click - CTA button click
  4. dsp_postback - AdKernel postback (step_1: LP click) [Only if goal_id present]
  5. master_lp_click_retargeting - Archetype/angle retargeting (15 pixels)
  
  ON FORM COMPLETION:
  6. lead_conversion - Form/survey completed (FormBricks/TypeBot)
  7. master_lead_retargeting - Archetype/angle retargeting (20 pixels)
  
  ALL POSTBACKS MANAGED IN GTM (NOT HARDCODED IN JAVASCRIPT)
  
  ========================================================================
  -->

<script>
(function () {
  "use strict";

  // ============================================================================
  // STEP 1: LOAD BRAND CONFIG
  // ============================================================================
  
  let brandConfig = null;
  
  fetch('/brand-config.json')
    .then(res => {
      if (!res.ok) throw new Error('Config file not found');
      return res.json();
    })
    .then(config => {
      brandConfig = config;
      brandConfig._loaded = true;
      console.log('✅ brand-config.json loaded successfully');
      initializePage();
    })
    .catch(err => {
      console.warn('⚠️ brand-config.json not found, using defaults');
      // Fallback to defaults
      brandConfig = {
        brand: { 
          name: 'Brand Name', 
          code: 'brand', 
          gtmId: 'GTM-XXXXXXX', 
          copyright: '© 2026 Brand Name. All rights reserved.' 
        },
        landing_page: { 
          defaults: { 
            headline: 'Transform Your Business Today', 
            subheadline: 'Join thousands of successful companies already using our proven system', 
            cta_text: 'Get Started Now', 
            cta_link: 'https://calendly.com/yourbrand/meeting',
            background_image: '1_brand.jpg',
            overlay: 'dark'
          },
          styling: {
            button_color: '#2563eb',
            button_text_color: '#ffffff',
            button_size: 'large',
            button_style: 'rounded'
          },
          features: {
            social_proof: { enabled: false },
            scarcity: { enabled: false },
            micro_yes: { enabled: false }
          }
        },
        footer: { 
          links: {
            privacy: { enabled: true, text: 'Privacy', url: 'https://yourbrand.com/privacy' },
            terms: { enabled: true, text: 'Terms', url: 'https://yourbrand.com/terms' }
          }
        },
        tracking: { 
          cookies: { expirationDays: 365 } 
        }
      };
      initializePage();
    });

  function initializePage() {
    
    // ============================================================================
    // STEP 2: PARSE URL PARAMETERS
    // ============================================================================
    
    function parseParams(str) {
      str = (str || "").replace(/^[?#]/, "");
      var params = {};
      if (!str) return params;
      str.split("&").forEach(function (pair) {
        var parts = pair.split("=");
        var key = decodeURIComponent(parts[0] || "").trim();
        var val = decodeURIComponent((parts[1] || "").split("+").join(" ")).trim();
        if (key) params[key] = val;
      });
      return params;
    }

    var params = Object.assign({}, parseParams(window.location.search), parseParams(window.location.hash));
    var DEBUG = params.debug === "1";

    if (params.test_all === "1") {
      params.social_proof = "on";
      params.scarcity = params.scarcity || "3";
      params.progress = params.progress || "1";
      params.micro_yes = "on";
      params.btn_size = params.btn_size || "large";
      params.overlay = params.overlay || "medium";
      DEBUG = true;
      console.log("🧪 TEST_ALL MODE ENABLED");
    }

    if (DEBUG) console.log("🔍 DEBUG MODE ENABLED");
    if (DEBUG) console.log("📋 ALL PARAMS:", params);
    if (DEBUG && brandConfig) {
      console.log("📦 Brand Config:", {
        name: brandConfig.brand.name,
        code: brandConfig.brand.code,
        gtmId: brandConfig.brand.gtmId,
        configLoaded: !!brandConfig._loaded
      });
    }
    
    // ============================================================================
    // STEP 3: LOAD GTM DYNAMICALLY
    // ============================================================================
    
    const gtmId = brandConfig.brand.gtmId;
    const gtmScript = document.getElementById('gtm-loader');
    gtmScript.innerHTML = `(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','${gtmId}');`;
    
    // Add GTM noscript
    const noscript = document.createElement('noscript');
    noscript.innerHTML = `<iframe src="https://www.googletagmanager.com/ns.html?id=${gtmId}" height="0" width="0" style="display:none;visibility:hidden"></iframe>`;
    document.body.insertBefore(noscript, document.body.firstChild);
    
    if (DEBUG) console.log('✅ GTM Loaded:', gtmId);

    // ============================================================================
    // STEP 4: COOKIE STORAGE (365 DAYS)
    // ============================================================================
    
    const cookieExpiration = brandConfig.tracking?.cookies?.expirationDays || 365;
    
    function setCookie(name, value, days) {
      days = days || cookieExpiration;
      if (!value || value === 'undefined' || value === 'null') return;
      var expires = new Date();
      expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + expires.toUTCString() + ';path=/';
    }
    
    function getCookie(name) {
      const value = "; " + document.cookie;
      const parts = value.split("; " + name + "=");
      if (parts.length == 2) return decodeURIComponent(parts.pop().split(";").shift());
      return '';
    }

    console.log(`🍪 Storing all tracking parameters in cookies (${cookieExpiration}-day expiration)...`);

    // ============================================================================
    // ADKERNEL CORE PARAMETERS (6) - EXACT NAMES (NO _id SUFFIXES!)
    // ============================================================================
    
    // Accept URL aliases but STORE as official names
    setCookie('conversion', params.trck || params.conversion || params.click_id);
    setCookie('campaign', params.campaign_id || params.campaign);
    setCookie('banner', params.creative_id || params.banner_id || params.banner);
    setCookie('publisher', params.publisher_id || params.publisher);
    setCookie('offer', params.offer_id || params.offer);
    setCookie('goal_id', params.goal_id);
    
    setCookie('conversion_value', params.conversion_value || '0');
    setCookie('conversion_type', params.conversion_type || 'generic');
    setCookie('brand', brandConfig.brand.code);
    setCookie('dsp_step', params.dsp_step || '3');

    if (DEBUG) {
      console.log('🔑 AdKernel Core Mapping:');
      console.log('  URL → Cookie Storage:');
      console.log('  trck → conversion:', params.trck);
      console.log('  campaign_id → campaign:', params.campaign_id);
      console.log('  creative_id → banner:', params.creative_id);
      console.log('  publisher_id → publisher:', params.publisher_id);
    }

    // ============================================================================
    // ADKERNEL NATIVE PARAMETERS (38) - EXACT CAPITALIZATION!
    // ============================================================================
    
    setCookie('pubzone', params.pubzone);
    setCookie('country_name', params.country_name);
    setCookie('region', params.region);
    setCookie('city', params.city);
    setCookie('device_type', params.device_type);
    setCookie('os', params.os);
    setCookie('browser', params.browser);
    setCookie('Keyword', params.Keyword); // ⚠️ Capital K!
    setCookie('bid', params.bid);
    setCookie('date', params.date);
    setCookie('day_of_month', params.day_of_month);
    setCookie('day_of_week', params.day_of_week);
    setCookie('device_brand', params.device_brand);
    setCookie('device_model', params.device_model);
    setCookie('request_id', params.request_id);
    setCookie('month', params.month);
    setCookie('original_subid', params.original_subid);
    setCookie('os_type', params.os_type);
    setCookie('postback_id', params.postback_id);
    setCookie('app_bundle', params.app_bundle || params.bundle);
    setCookie('app_id', params.app_id);
    setCookie('pubfeed', params.pubfeed);
    setCookie('subid', params.subid);
    setCookie('payout', params.payout);
    setCookie('pubpoint', params.pubpoint);
    setCookie('Query', params.Query); // ⚠️ Capital Q!
    setCookie('site_id', params.site_id);
    setCookie('referrer_domain', params.referrer_domain || params.referrer);
    setCookie('remfeed', params.remfeed);
    setCookie('ga', params.ga);
    setCookie('search_referrer_domain', params.search_referrer_domain);
    setCookie('search_ip', params.search_ip);
    setCookie('source_subid', params.source_subid);
    setCookie('State_Name', params.State_Name); // ⚠️ Capitals!
    setCookie('source', params.source);
    setCookie('ip', params.ip);
    setCookie('carrier', params.carrier);
    setCookie('zip', params.zip);
    setCookie('state', params.state);
    setCookie('country', params.country);
    
    // Additional Tracking
    setCookie('page_url', window.location.href);
    setCookie('referrer', document.referrer);
    setCookie('timestamp', params.timestamp || new Date().toISOString());
    setCookie('user_agent', navigator.userAgent);
    setCookie('placement_id', params.placement_id);
    setCookie('tagid', params.tagid);
    
    // ============================================================================
    // KEITARO ROUTING (13)
    // ============================================================================
    
    setCookie('keitaro_subid', params.subid);
    setCookie('_lp', params._lp);
    setCookie('_offer_id', params._offer_id);
    setCookie('sub1', params.sub1);
    setCookie('sub2', params.sub2);
    setCookie('sub3', params.sub3);
    setCookie('sub4', params.sub4);
    setCookie('sub5', params.sub5);
    setCookie('sub6', params.sub6);
    setCookie('sub7', params.sub7);
    setCookie('sub8', params.sub8);
    setCookie('sub9', params.sub9);
    setCookie('sub10', params.sub10);
    
    // ============================================================================
    // CREATIVE DNA - UNIVERSAL (8)
    // ============================================================================
    
    setCookie('av', params.av);
    setCookie('mb', params.mb);
    setCookie('io', params.io);
    setCookie('ct', params.ct);
    setCookie('ps', params.ps);
    setCookie('ca', params.ca);
    setCookie('up', params.up);
    setCookie('se', params.se);
    
    // ============================================================================
    // CREATIVE DNA - VIDEO (10)
    // ============================================================================
    
    setCookie('ss', params.ss);
    setCookie('ht', params.ht);
    setCookie('mpp', params.mpp);
    setCookie('nts', params.nts);
    setCookie('vs', params.vs);
    setCookie('bm', params.bm);
    setCookie('ts', params.ts);
    setCookie('gtu', params.gtu);
    setCookie('vl', params.vl);
    setCookie('ve', params.ve);
    
    // ============================================================================
    // CREATIVE DNA - DISPLAY (9)
    // ============================================================================
    
    setCookie('ii', params.ii);
    setCookie('ih', params.ih);
    setCookie('ic', params.ic);
    setCookie('bc', params.bc);
    setCookie('in', params.in);
    setCookie('to', params.to);
    setCookie('sp', params.sp);
    setCookie('at', params.at);
    setCookie('wf', params.wf);
    
    // ============================================================================
    // CREATIVE DNA - PUSH (5)
    // ============================================================================
    
    setCookie('pi', params.pi);
    setCookie('th', params.th);
    setCookie('mc', params.mc);
    setCookie('ul', params.ul);
    setCookie('pz', params.pz);
    
    // ============================================================================
    // CREATIVE DNA - POP (4)
    // ============================================================================
    
    setCookie('ag', params.ag);
    setCookie('vh', params.vh);
    setCookie('eit', params.eit);
    setCookie('ue', params.ue);
    
    // ============================================================================
    // ECHO LANDING PAGE PERSONALIZATION (27)
    // ============================================================================
    
    setCookie('fi', params.fi);
    setCookie('hl', params.hl);
    setCookie('sh', params.sh);
    setCookie('cta', params.cta);
    setCookie('img', params.img);
    setCookie('link', params.link);
    setCookie('font', params.font);
    setCookie('btn_color', params.btn_color);
    setCookie('btn_text', params.btn_text);
    setCookie('btn_size', params.btn_size);
    setCookie('btn_style', params.btn_style);
    setCookie('hl_size', params.hl_size);
    setCookie('sh_size', params.sh_size);
    setCookie('hl_color', params.hl_color);
    setCookie('sh_color', params.sh_color);
    setCookie('overlay', params.overlay);
    setCookie('overlay_custom', params.overlay_custom);
    setCookie('social_proof', params.social_proof);
    setCookie('social_text', params.social_text);
    setCookie('scarcity', params.scarcity);
    setCookie('scarcity_text', params.scarcity_text);
    setCookie('progress', params.progress);
    setCookie('micro_yes', params.micro_yes);
    setCookie('micro_text', params.micro_text);
    
    // ANGLE DESK PARAMETERS (5)
    setCookie('archetype', params.archetype);
    setCookie('angle', params.angle);
    setCookie('variant', params.variant);
    setCookie('phase', params.phase);
    setCookie('ad', params.ad); // NEW: P1_AT2_AG3_V004 format
    
    // ============================================================================
    // AVALANCHE CORE TOKENS (10)
    // ============================================================================
    
    setCookie('session_token', params.session_token || 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9));
    setCookie('user_fingerprint', params.user_fingerprint);
    setCookie('belief_pattern', params.belief_pattern);
    setCookie('archetype_signature_token', params.archetype_signature_token);
    setCookie('remnant_index', params.remnant_index || '0');
    setCookie('exit_trigger', params.exit_trigger);
    setCookie('activation_path_code', params.activation_path_code);
    setCookie('emotional_readiness', params.emotional_readiness || '0');
    setCookie('token_lineage', params.token_lineage);
    setCookie('soul_pattern_map', params.soul_pattern_map);
    
    // ============================================================================
    // AVALANCHE PERFORMANCE (8)
    // ============================================================================
    
    setCookie('eps_score', params.eps_score || '0');
    setCookie('aps_score', params.aps_score || '0');

          origin + "/public/" + mobileChosen,
          origin + "/" + mobileChosen,
          origin + "/public/" + chosen,

          origin + "/public/" + chosen,
          origin + "/" + chosen
        ];

          if (i >= candidates.length) {
            if (DEBUG) console.log("❌ BG Load Failed:", candidates);
            return;

            tryLoad(i + 1);
